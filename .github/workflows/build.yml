name: Build DeskStick

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxcb1 libx11-6 libgl1
          pip install PyQt6 pyinstaller
      - name: Build
        run: |
          pyinstaller --onefile --windowed --name DeskStick \
            --collect-all PyQt6 main.py
          mv dist/DeskStick "dist/Download-Linux"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Download-Linux
          path: dist/Download-Linux

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install PyQt6 pyinstaller
      - name: Build
        run: |
          pyinstaller --onefile --windowed --name DeskStick `
            --collect-all PyQt6 main.py
          mv dist\DeskStick.exe "dist\Download-Windows.exe"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Download-Windows
          path: dist/Download-Windows.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install PyQt6 pyinstaller
      - name: Build
        run: |
          pyinstaller --onefile --windowed --name DeskStick \
            --collect-all PyQt6 main.py
          mv dist/DeskStick "dist/Download-macOS"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Download-macOS
          path: dist/Download-macOS

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DeskStick ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            Download-Linux/Download-Linux
            Download-Windows/Download-Windows.exe
            Download-macOS/Download-macOS
